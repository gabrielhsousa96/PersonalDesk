<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gestão de Tipos - Helpdesk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9",
                        "background-light": "#f6f8f7",
                        "background-dark": "#0c111d",
                        "card-dark": "#111827",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Unified Top Header -->
    <div id="top-header"></div>

    <!-- Main Content -->
    <main class="flex-1 w-full overflow-y-auto p-4 pb-24 pt-0">
        <div class="max-w-5xl mx-auto w-full space-y-6">
            <div class="flex items-center justify-between">
                <p class="text-slate-400 text-sm font-medium">Configure os tipos de chamados do sistema</p>
                <button onclick="openNewTypeModal()" class="bg-primary hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">add</span>
                    Novo Tipo
                </button>
            </div>

            <div class="bg-card-dark rounded-xl border border-white/5 overflow-hidden shadow-xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5">
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">Tipo</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-white/5 text-right px-6">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="typesTableBody">
                        <!-- Types will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Novo Tipo -->
    <div id="newTypeModal" class="fixed inset-0 z-[110] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-card-dark border border-white/10 w-full max-w-md rounded-2xl shadow-2xl animate-up">
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-4">Adicionar Novo Tipo</h3>
                    <input type="text" id="typeName" placeholder="Nome do Tipo"
                        class="w-full bg-black/40 border-white/10 rounded-xl px-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-white placeholder:text-slate-600 mb-6">
                    <div class="flex gap-3">
                        <button onclick="closeNewTypeModal()" class="flex-1 px-4 py-3 rounded-xl border border-white/10 text-slate-400 font-bold hover:bg-white/5 transition-all">Cancelar</button>
                        <button onclick="saveNewType()" class="flex-1 px-4 py-3 rounded-xl bg-primary text-black font-bold hover:brightness-110 transition-all">Salvar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Unified Bottom Navigation -->
    <div id="bottom-nav"></div>

    <script src="/static/header.js?v=20"></script>
    <script src="/static/nav.js?v=20"></script>
    <script src="/static/types.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
