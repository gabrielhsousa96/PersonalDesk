<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9",
                        "background-light": "#f6f8f7",
                        "background-dark": "#0c111d",
                        "card-dark": "#1e293b",
                        "input-dark": "#334155",
                        "text-primary": "#f8fafc",
                        "text-secondary": "#94a3b8",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-text-primary min-h-screen flex flex-col">
<!-- Header Section -->
<!-- Unified Top Header -->
<div id="top-header"></div>

<main class="flex-1 overflow-y-auto px-4 py-6 pb-24 pt-0">
    <div class="max-w-5xl mx-auto flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <p class="text-slate-400 text-sm font-medium">Configure as categorias do sistema</p>
            <button onclick="openNewCategoryModal()" class="flex items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white gap-2 text-sm font-bold shadow-lg shadow-primary/20 hover:bg-emerald-600 transition-all">
                <span class="material-symbols-outlined text-[20px]">add</span>
                <span class="truncate">Nova Categoria</span>
            </button>
        </div>
<!-- Categories Table/List -->
<div class="px-4">
<div class="overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-card-dark">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-slate-50 dark:bg-slate-800/50">
<th class="px-4 py-3 text-xs font-semibold text-text-secondary uppercase tracking-wider border-b border-slate-200 dark:border-slate-800">Categoria</th>
<th class="px-4 py-3 text-xs font-semibold text-text-secondary uppercase tracking-wider border-b border-slate-200 dark:border-slate-800">Tipo Relacionado</th>
</tr>
</thead>
<tbody id="categoriesTableBody" class="divide-y divide-slate-100 dark:divide-slate-800">
    <!-- Rows will be populated by Javascript -->
</tbody>
</table>
</div>
</div>
</div>
</main>
    <!-- Unified Bottom Navigation -->
    <div id="bottom-nav"></div>

    <script src="/static/header.js?v=20"></script>
<script src="/static/nav.js?v=20"></script>
    <script src="/static/categories.js"></script>
    <script src="/static/app.js"></script>
</body></html>
