<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#10b77f",
                "background-light": "#f6f8f7",
                "background-dark": "#10221c",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-950 font-display flex items-center justify-center min-h-screen text-slate-100 p-4">
<div class="w-full max-w-md">
<!-- Brand/Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary/20 rounded-xl flex items-center justify-center mb-4">
<span class="material-icons text-primary text-4xl">vpn_key</span>
</div>
<h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-blue-500">
                Alterar Senha
            </h1>
<p class="text-slate-400 mt-2 text-center text-sm">
                Digite sua nova senha abaixo para recuperar o acesso.
            </p>
</div>
<!-- Main Card -->
<div class="bg-slate-800 rounded-xl shadow-2xl border border-slate-700/50 p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Current Password Field -->
<div>
<label class="block text-sm font-medium text-slate-400 mb-2" for="current-password">
                        Senha Atual
                    </label>
<div class="relative">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">lock_open</span>
<input class="w-full bg-slate-700 border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-50 placeholder-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="current-password" name="current-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- New Password Field -->
<div>
<label class="block text-sm font-medium text-slate-400 mb-2" for="new-password">
                        Nova Senha
                    </label>
<div class="relative">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">lock</span>
<input class="w-full bg-slate-700 border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-50 placeholder-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="new-password" name="new-password" placeholder="••••••••" type="password"/>
</div>
<div class="mt-2 flex gap-1">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-slate-700 rounded-full"></div>
<div class="h-1 flex-1 bg-slate-700 rounded-full"></div>
</div>
<p class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider font-semibold">Segurança: Média</p>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block text-sm font-medium text-slate-400 mb-2" for="confirm-password">
                        Confirmar Nova Senha
                    </label>
<div class="relative">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">verified_user</span>
<input class="w-full bg-slate-700 border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-50 placeholder-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2 group shadow-lg shadow-primary/20" type="submit">
<span>Atualizar Senha</span>
<span class="material-icons text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-8 pt-6 border-t border-slate-700 text-center">
<a class="inline-flex items-center text-sm font-medium text-slate-400 hover:text-primary transition-colors gap-1 group" href="#">
<span class="material-icons text-xs group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Voltar para o login
                </a>
</div>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center text-slate-500 text-xs">
<p>© 2024 HelpDesk Management System</p>
<p class="mt-1">Ambiente seguro com criptografia de ponta a ponta.</p>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 via-primary to-blue-500"></div>
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-24 -left-24 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl -z-10"></div>
</body></html>
