<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#0f172a",
                        "slate-800": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header / Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Desk de Tickets</h2>
</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl flex flex-col items-center text-center border border-slate-200 dark:border-slate-700">
<!-- Success Icon -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
<div class="relative flex items-center justify-center w-24 h-24 bg-primary rounded-full shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-5xl">check_circle</span>
</div>
</div>
<!-- Headline -->
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl md:text-3xl font-bold leading-tight mb-4">
                Senha Alterada com Sucesso!
            </h1>
<!-- Confirmation Message -->
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed mb-10 max-w-xs">
                Sua senha foi atualizada. Agora você pode acessar sua conta com a nova credencial.
            </p>
<!-- Primary Action Button -->
<a class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-6 rounded-lg transition-all transform active:scale-[0.98] shadow-lg shadow-primary/20 flex items-center justify-center gap-2" href="#">
                Ir para o Login
                <span class="material-symbols-outlined text-[20px]">login</span>
</a>
<!-- Secondary Info -->
<div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700 w-full text-sm text-slate-500 dark:text-slate-500">
                Problemas para acessar? <a class="text-primary hover:underline font-medium" href="#">Contate o suporte</a>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Reuse component style) -->
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800 px-4 pb-6 pt-3 sticky bottom-0">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">confirmation_number</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">notifications</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</a>
</div>
</body></html>
