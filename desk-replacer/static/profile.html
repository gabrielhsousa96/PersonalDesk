<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Meu Perfil</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1",
                        "background-light": "#f6f8f7",
                        "background-dark": "#0f172a",
                        "slate-card": "#1e293b",
                        "slate-input": "#334155"
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-[100dvh] overflow-hidden flex flex-col">
    <!-- Header -->
    <!-- Unified Top Header -->
    <div id="top-header"></div>

    <main class="flex-1 overflow-y-auto w-full">
        <div class="max-w-2xl mx-auto p-4 space-y-6">
            <!-- Profile Section -->
        <section class="flex flex-col items-center py-6">
            <div class="relative group">
                <div class="size-32 rounded-full overflow-hidden border-4 border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-4xl font-bold text-slate-400"
                    id="avatarLetter">
                    <!-- Letter fallback -->
                    U
                </div>
            </div>

            <div class="text-center mt-4">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-50" id="profileNameDisplay">Carregando...
                </h2>
                <p class="text-slate-500 dark:text-slate-400" id="profileRoleDisplay">...</p>
            </div>
        </section>

        <!-- Form Section -->
        <div
            class="bg-white dark:bg-slate-card rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 space-y-4">
            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-50 mb-4">Informações Pessoais</h3>
            <div class="grid grid-cols-1 gap-4">
                <label class="block">
                    <span class="text-sm font-medium text-slate-500 dark:text-slate-400 block mb-1.5">Usuário
                        (Username)</span>
                    <input id="inputUsername"
                        class="w-full rounded-lg border-none bg-slate-100 dark:bg-slate-input text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-primary h-12 px-4 placeholder:text-slate-400 opacity-70"
                        type="text" readonly disabled />
                </label>
                <label class="block">
                    <span class="text-sm font-medium text-slate-500 dark:text-slate-400 block mb-1.5">Nome
                        Completo</span>
                    <input id="inputFullName"
                        class="w-full rounded-lg border-none bg-slate-100 dark:bg-slate-input text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-primary h-12 px-4 placeholder:text-slate-400 opacity-70"
                        type="text" readonly disabled value="--" />
                </label>
                <label class="block">
                    <span class="text-sm font-medium text-slate-500 dark:text-slate-400 block mb-1.5">E-mail de
                        Contato</span>
                    <input id="inputEmail"
                        class="w-full rounded-lg border-none bg-slate-100 dark:bg-slate-input text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-primary h-12 px-4 placeholder:text-slate-400 opacity-70"
                        type="email" readonly disabled value="--" />
                </label>
                <div class="block">
                    <span class="text-sm font-medium text-slate-500 dark:text-slate-400 block mb-1.5">Telefone /
                        WhatsApp</span>
                    <div class="flex gap-3">
                        <input id="inputAreaCode"
                            class="w-20 rounded-lg border-none bg-slate-100 dark:bg-slate-input text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-primary h-12 px-4 placeholder:text-slate-400 opacity-70 text-center"
                            type="text" readonly disabled value="--" />
                        <input id="inputPhone"
                            class="flex-1 rounded-lg border-none bg-slate-100 dark:bg-slate-input text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-primary h-12 px-4 placeholder:text-slate-400 opacity-70 tracking-wide"
                            type="text" readonly disabled value="--" />
                    </div>
                </div>
            </div>
        </div>

        <!-- Preferences Section -->
        <div
            class="bg-white dark:bg-slate-card rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 space-y-4">
            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-50 mb-4">Preferências</h3>
            <div class="flex items-center gap-3">
                <div class="relative flex items-center justify-center">
                    <input id="checkNotifications" type="checkbox"
                        class="peer appearance-none w-5 h-5 border-2 border-slate-300 dark:border-slate-600 rounded bg-transparent checked:bg-primary checked:border-primary transition-all opacity-70"
                        disabled readonly />
                    <span
                        class="material-symbols-outlined text-white text-sm absolute pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                </div>
                <label
                    class="text-slate-600 dark:text-slate-400 text-sm font-medium cursor-default leading-none pt-0.5">
                    Receber notificações do Helpdesk por e-mail
                </label>
            </div>
        </div>

        <!-- Registry Details (Read-only) -->
        <div class="bg-white dark:bg-slate-card rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-800">
            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-50 mb-4">Detalhes de Registro</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">Criado
                        via ID</p>
                    <p class="mt-1 text-slate-900 dark:text-slate-100" id="infoUserId">#...</p>
                </div>
                <div>
                    <p class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">Nível de
                        Acesso (Cargo)</p>
                    <p class="mt-1 flex items-center gap-1.5 text-slate-900 dark:text-slate-100">
                        <span class="size-2 rounded-full bg-primary" id="roleDot"></span>
                        <span id="infoRole">...</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="pt-4 flex flex-col gap-3">
            <button id="btnEditProfile" type="button" class="w-full bg-primary hover:bg-indigo-600 text-white font-bold py-4 rounded-xl shadow border border-primary/20 transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-lg">edit</span>
                Editar Perfil
            </button>
            <button id="btnSaveProfile" type="button" class="hidden w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-xl shadow border border-amber-500/20 transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-lg">save</span>
                Salvar Alterações
            </button>
            <button onclick="logout()"
                class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-500 font-bold py-4 rounded-xl shadow border border-red-500/20 transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-lg">logout</span>
                Sair da Conta (Logout)
            </button>
        </div>
        </div>
    </main>

    <!-- Unified Bottom Navigation -->
    <div id="bottom-nav"></div>

    <script src="/static/header.js?v=20"></script>
    <script src="/static/nav.js?v=20"></script>
    <script src="/static/profile.js?v=3"></script>
    <script src="/static/app.js"></script>
</body>

</html>
