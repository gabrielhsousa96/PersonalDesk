<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981",
                        "background-light": "#f6f8f7",
                        "background-dark": "#0f172a", // Updated to match user request
                        "card-dark": "#1e293b",
                        "input-dark": "#334155",
                        "accent-blue": "#3b82f6"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Desk de Tickets - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo/Header Area -->
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary/20 mb-4">
<span class="material-symbols-outlined text-primary text-4xl">confirmation_number</span>
</div>
<h1 class="text-4xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-accent-blue pb-2">
                Desk de Tickets
            </h1>
<p class="text-slate-500 dark:text-slate-400">Gerencie seus chamados com eficiência</p>
</div>
<!-- Login Card -->
<div class="w-full bg-white dark:bg-card-dark p-8 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800">
<!-- Dynamic Alert Error -->
<div id="loginError" class="hidden mb-4 p-4 rounded-lg bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-200 dark:border-red-900/50">
    Usuário ou senha incorretos.
</div>
<form id="loginForm" class="space-y-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-600 dark:text-slate-400">Usuário</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input id="username" name="username" class="w-full pl-10 pr-4 h-12 bg-slate-50 dark:bg-input-dark border-slate-200 dark:border-input-dark rounded-lg text-slate-900 dark:text-slate-50 placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Seu usuário" type="text" required/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-600 dark:text-slate-400">Senha</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input id="password" name="password" class="w-full pl-10 pr-12 h-12 bg-slate-50 dark:bg-input-dark border-slate-200 dark:border-input-dark rounded-lg text-slate-900 dark:text-slate-50 placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="••••••••" type="password" required/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-300" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-slate-50 font-bold rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
                    Entrar
                    <span class="material-symbols-outlined text-xl">login</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500">ou</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-11 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-sm font-medium" type="button">
<img alt="Google" class="w-5 h-5" data-alt="Logotipo colorido do Google" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKh4HmN7FFyBr6Ik4JANJqnMq8VA6lblkKGRMpcDtp9WfaQ-_Rdf2Ktm4gv88qa87PX3DtJpPoTLOKe4UhvIdgRKDLjaLg1hnqxJMAshixHJNvfODzJdn-yeWY_BgVSJHYO0yjnfb12n-xP5hdR_8crud3xx9_6ElW6eXZnxCqnfUwYyfCBD3PXVdVw6-o9X0TiovjbyEkJbQjzh8HhptZ7300fcfWsoK4v5-P7RMSA-T5O9PZ0wvMRYCBbMmOf8j6-3bcba6sCts"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 h-11 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-sm font-medium" type="button">
<img alt="Microsoft" class="w-5 h-5" data-alt="Logotipo oficial da Microsoft" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaYgsMNHVxyaLiHsYWwIdq-PzzJRuxUt238Ru8OvgOgIxD8Mawv6hs6Ur0dom3jPnqPi6XITboLx7eh6uDSvKVC1ItvuQ1kueT7eKndmOCn4ELsoV0sbQNjyCbs8mApuA5inzBAhWnJgknrvL0OJ4pUegt-vdK0iJINS6Tzp_JkBvkQvncz0Sw_ZRI4XrVHvTYM5zUfSUNLxzU1SEmIXpHyZR9MmWqv3qPhioWHorwGckf0QQCFYu552LMSfLy91jQz6Q4Ud_U7uw"/>
                        Microsoft
                    </button>
</div>
</form>
</div>
<!-- Footer Link -->
<p class="mt-8 text-sm text-slate-500 dark:text-slate-400">
            Ainda não tem uma conta? 
            <a class="text-primary font-semibold hover:underline" href="#">Solicite acesso agora</a>
</p>
</div>
<script src="/static/app.js"></script>
</body></html>
